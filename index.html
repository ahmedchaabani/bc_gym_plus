<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111114">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>BC GYM PLUS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #111114;
  --bg2:       #18181c;
  --card:      #1e1e23;
  --card2:     #25252b;
  --border:    #2e2e36;
  --border2:   #3a3a44;
  --accent:    #4f8ef7;
  --accent-d:  #3a7ae8;
  --accent-bg: rgba(79,142,247,0.1);
  --accent-bg2:rgba(79,142,247,0.06);
  --green:     #34d399;
  --green-bg:  rgba(52,211,153,0.1);
  --gold:      #fbbf24;
  --gold-bg:   rgba(251,191,36,0.12);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,0.1);
  --text:      #f0f0f4;
  --text2:     #9090a0;
  --text3:     #55556a;
  --font:      'DM Sans', sans-serif;
  --mono:      'DM Mono', monospace;
  --r:         16px;
  --r-btn:     12px;
  --r-pill:    50px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;padding-bottom:84px;overscroll-behavior:none}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,17,20,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.3px;cursor:pointer;transition:color .2s}
.nav-item svg{width:22px;height:22px;stroke-width:1.8;transition:all .2s;stroke:currentColor;fill:none}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{filter:drop-shadow(0 0 6px rgba(79,142,247,.5))}

/* SCREENS */
.screen{display:none}
.screen.active{display:block}

/* PAGE HEADER */
.page-header{padding:18px 16px 8px;position:sticky;top:0;z-index:100;background:rgba(17,17,20,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.page-title{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px;font-weight:400}

/* CONTENT */
.content{padding:8px 16px 16px}

/* EXERCISE PICKER OVERLAY */
.ex-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:none;align-items:flex-end}
.ex-picker-overlay.open{display:flex}
.ex-picker-sheet{width:100%;background:var(--card);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);max-height:80dvh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.32,1,.28,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto}
.sheet-title{font-size:18px;font-weight:700;padding:4px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-search{margin:12px 16px;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:500;padding:12px 16px;outline:none;width:calc(100% - 32px)}
.sheet-search:focus{border-color:var(--accent)}
.sheet-list{overflow-y:auto;padding:0 12px 12px}
.sheet-ex-item{display:flex;align-items:center;padding:14px 10px;border-radius:12px;cursor:pointer;transition:background .15s;gap:12px}
.sheet-ex-item:active{background:var(--card2)}
.sheet-ex-icon{width:40px;height:40px;background:var(--card2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sheet-ex-name{font-size:15px;font-weight:600}
.sheet-ex-muscle{font-size:12px;color:var(--text2);margin-top:1px}
.sheet-ex-divider{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:12px 10px 4px}

/* ADD EXERCISE BTN */
.add-exercise-btn{width:100%;display:flex;align-items:center;gap:12px;padding:16px;background:var(--accent-bg2);border:1.5px dashed rgba(79,142,247,.3);border-radius:var(--r);color:var(--accent);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:12px}
.add-exercise-btn:active{background:var(--accent-bg);border-style:solid}
.add-exercise-btn svg{width:20px;height:20px;stroke:var(--accent);fill:none;flex-shrink:0;stroke-width:2.5}

/* EXERCISE CARD */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.ex-card-header{display:flex;align-items:center;padding:14px 16px;gap:12px}
.ex-card-icon{width:42px;height:42px;background:var(--accent-bg);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ex-card-info{flex:1;min-width:0}
.ex-card-name{font-size:16px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.ex-card-sub{font-size:12px;color:var(--text2);margin-top:2px}
.ex-card-remove{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;transition:color .2s;display:flex;align-items:center}
.ex-card-remove:active{color:var(--red)}
.ex-card-remove svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}

/* SET TABLE */
.set-table-head{display:grid;grid-template-columns:36px 1fr 1fr 1fr 36px;gap:6px;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 1fr 36px;gap:6px;padding:8px 16px;align-items:center;border-top:1px solid var(--border);animation:rowIn .2s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.set-num{font-size:13px;font-weight:700;color:var(--text2);text-align:center}
.set-prev{font-size:13px;color:var(--text3);font-family:var(--mono);text-align:center}
.set-input{background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;padding:10px 6px;text-align:center;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s}
.set-input:focus{border-color:var(--accent);background:var(--accent-bg2)}
.set-input::placeholder{color:var(--text3);font-size:13px}
.set-done-btn{width:32px;height:32px;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.set-done-btn svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2.5}
.set-done-btn.done{background:var(--green-bg);border-color:var(--green)}
.set-done-btn.done svg{stroke:var(--green)}
.set-row.completed .set-num{color:var(--green)}
.set-row.completed{background:rgba(52,211,153,.04)}

/* PR BADGE */
.pr-badge{display:inline-flex;align-items:center;gap:3px;background:var(--gold-bg);border:1px solid rgba(251,191,36,.3);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:var(--r-pill)}

/* ADD SET BTN */
.add-set-btn{width:100%;padding:12px;background:none;border:none;border-top:1px solid var(--border);color:var(--accent);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.add-set-btn:active{background:var(--accent-bg2)}
.add-set-btn svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2.5}

/* FINISH BTN */
.finish-btn{width:100%;padding:18px;background:var(--accent);border:none;border-radius:var(--r-btn);color:#fff;font-family:var(--font);font-size:17px;font-weight:700;cursor:pointer;letter-spacing:-.2px;box-shadow:0 4px 20px rgba(79,142,247,.35);transition:all .15s;margin-top:8px}
.finish-btn:active{transform:scale(.98);box-shadow:0 2px 10px rgba(79,142,247,.25)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state-icon{font-size:56px;margin-bottom:14px;opacity:.6;display:block}
.empty-state-title{font-size:18px;font-weight:700;color:var(--text2)}
.empty-state-sub{font-size:14px;margin-top:6px;line-height:1.5}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-val{font-size:32px;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1}
.stat-val.blue{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-label{font-size:11px;color:var(--text2);margin-top:5px;font-weight:500;letter-spacing:.3px}

/* MINI CHART */
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:44px}
.mini-bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px;opacity:.5;transition:height .4s ease}
.mini-bar.today{opacity:1}

/* HISTORY */
.history-day{margin-bottom:20px}
.history-day-label{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:4px 0 10px;display:flex;align-items:center;gap:8px}
.history-day-label::after{content:'';flex:1;height:1px;background:var(--border)}
.history-workout-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px}
.history-wc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.history-wc-meta{font-size:12px;color:var(--text2)}
.history-wc-vol{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:500}
.history-wc-pills{display:flex;flex-wrap:wrap;gap:6px}
.history-pill{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--text2)}
.history-pill.pr{border-color:rgba(251,191,36,.3);color:var(--gold);background:var(--gold-bg)}

/* COACH */
.coach-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.coach-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.coach-avatar{width:46px;height:46px;border-radius:14px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:1px solid rgba(79,142,247,.2)}
.coach-name{font-size:16px;font-weight:700}
.coach-role{font-size:12px;color:var(--accent);font-weight:500;margin-top:1px}
.coach-msg{font-size:15px;color:var(--text);line-height:1.65;font-weight:400}
.tip-block{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.tip-tag{display:inline-block;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-pill);margin-bottom:7px}
.tip-text{font-size:14px;color:var(--text2);line-height:1.65}
.i-bar-wrap{background:var(--card2);border-radius:6px;height:8px;margin:8px 0;overflow:hidden}
.i-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-d),var(--accent));transition:width .7s cubic-bezier(.4,0,.2,1)}

/* SETTINGS */
.settings-section{margin-bottom:20px}
.settings-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:0 4px 8px}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.settings-row{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--card2)}
.settings-row-icon{font-size:20px;width:34px;text-align:center}
.settings-row-title{font-size:15px;font-weight:600}
.settings-row-sub{font-size:12px;color:var(--text2);margin-top:1px}
.settings-row-arrow{color:var(--text3);font-size:18px;margin-left:auto}
.danger-btn{width:100%;padding:16px;background:var(--red-bg);border:1px solid rgba(248,113,113,.2);border-radius:var(--r);color:var(--red);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.danger-btn:active{background:rgba(248,113,113,.2)}

/* CUSTOM EX */
.custom-ex-input-row{display:flex;gap:8px;padding:12px 16px}
.custom-ex-input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:500;padding:12px 14px;outline:none}
.custom-ex-input:focus{border-color:var(--accent)}
.custom-ex-add-btn{padding:12px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.custom-ex-chips{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 14px}
.custom-ex-chip{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--text2)}
.custom-ex-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0;line-height:1;transition:color .15s}
.custom-ex-del:active{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--card2);border:1px solid var(--border2);color:var(--text);font-size:14px;font-weight:600;padding:11px 20px;border-radius:var(--r-pill);opacity:0;transition:all .25s;z-index:999;white-space:nowrap;backdrop-filter:blur(20px);pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- WORKOUT SCREEN -->
<div class="screen active" id="screen-workout">
  <div class="page-header">
    <div class="page-title">
      <span>Workout <span style="color:var(--accent)">+</span></span>
      <span id="headerDate" style="font-size:13px;font-weight:500;color:var(--text2)"></span>
    </div>
  </div>
  <div class="content" id="workoutContent"></div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="page-header">
    <div class="page-title">History</div>
  </div>
  <div class="content">
    <div class="stats-row" id="statsRow"></div>
    <div id="miniChartWrap" style="margin-bottom:16px"></div>
    <div id="historyList"></div>
  </div>
</div>

<!-- COACH SCREEN -->
<div class="screen" id="screen-coach">
  <div class="page-header">
    <div class="page-title">Coach</div>
  </div>
  <div class="content" id="coachContent"></div>
</div>

<!-- SETTINGS SCREEN -->
<div class="screen" id="screen-settings">
  <div class="page-header">
    <div class="page-title">Settings</div>
  </div>
  <div class="content">
    <div class="settings-section">
      <div class="settings-label">Data</div>
      <div class="settings-card">
        <div class="settings-row" onclick="exportData()">
          <span class="settings-row-icon">📤</span>
          <div style="flex:1">
            <div class="settings-row-title">Export as JSON</div>
            <div class="settings-row-sub">Backup all workout data</div>
          </div>
          <span class="settings-row-arrow">›</span>
        </div>
      </div>
      <button class="danger-btn" onclick="clearAllData()">🗑 Clear All Data</button>
    </div>
    <div class="settings-section">
      <div class="settings-label">Custom Exercises</div>
      <div class="settings-card">
        <div class="custom-ex-input-row">
          <input class="custom-ex-input" id="customExInput" placeholder="Exercise name…" autocomplete="off">
          <button class="custom-ex-add-btn" onclick="addCustomExercise()">Add</button>
        </div>
        <div class="custom-ex-chips" id="customExChips"></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">About</div>
      <div class="settings-card">
        <div class="settings-row" style="cursor:default">
          <span class="settings-row-icon">⚡</span>
          <div>
            <div class="settings-row-title">BC GYM PLUS</div>
            <div class="settings-row-sub">v2.0 · 100% offline · All data stored locally</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-item active" onclick="switchScreen('workout',this)">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
    Workout
  </button>
  <button class="nav-item" onclick="switchScreen('history',this)">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zm6.75-4.5c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zm6.75-4.5c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
    History
  </button>
  <button class="nav-item" onclick="switchScreen('coach',this)">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/></svg>
    Coach
  </button>
  <button class="nav-item" onclick="switchScreen('settings',this)">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Settings
  </button>
</nav>

<!-- EXERCISE PICKER SHEET -->
<div class="ex-picker-overlay" id="exPickerOverlay" onclick="closePickerOverlay(event)">
  <div class="ex-picker-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Exercise</div>
    <input class="sheet-search" id="exSearch" placeholder="Search exercises…" oninput="filterExList(this.value)" autocomplete="off">
    <div class="sheet-list" id="exList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const DB = {
  g:(k)=>{try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  workouts:()=>DB.g('bcgp_w')||[],
  saveWorkouts:(w)=>DB.s('bcgp_w',w),
  customEx:()=>DB.g('bcgp_ce')||[],
  saveCustomEx:(e)=>DB.s('bcgp_ce',e),
  session:()=>DB.g('bcgp_s')||null,
  saveSession:(s)=>DB.s('bcgp_s',s),
};

const EXERCISES = [
  {name:'Bench Press',icon:'🏋️',muscle:'Chest · Triceps'},
  {name:'Squat',icon:'🦵',muscle:'Quads · Glutes'},
  {name:'Deadlift',icon:'⚡',muscle:'Back · Glutes · Hamstrings'},
  {name:'Overhead Press',icon:'🙌',muscle:'Shoulders · Triceps'},
  {name:'Barbell Row',icon:'🔄',muscle:'Back · Biceps'},
  {name:'Pull-ups',icon:'💪',muscle:'Back · Biceps'},
  {name:'Dips',icon:'🤸',muscle:'Chest · Triceps'},
  {name:'Incline Press',icon:'📐',muscle:'Upper Chest'},
  {name:'Leg Press',icon:'🦵',muscle:'Quads · Glutes'},
  {name:'Lat Pulldown',icon:'⬇️',muscle:'Back · Biceps'},
  {name:'Cable Row',icon:'↔️',muscle:'Back · Biceps'},
  {name:'Bicep Curl',icon:'💪',muscle:'Biceps'},
  {name:'Tricep Extension',icon:'✊',muscle:'Triceps'},
  {name:'Romanian Deadlift',icon:'🔻',muscle:'Hamstrings · Glutes'},
  {name:'Push-ups',icon:'⬆️',muscle:'Chest · Triceps'},
  {name:'Lateral Raise',icon:'🦅',muscle:'Shoulders'},
  {name:'Face Pull',icon:'🎯',muscle:'Rear Delts'},
  {name:'Hip Thrust',icon:'🍑',muscle:'Glutes'},
  {name:'Calf Raise',icon:'👟',muscle:'Calves'},
  {name:'Plank',icon:'🧘',muscle:'Core'},
];

// ===================== SESSION =====================
let session;

function loadSession() {
  const saved = DB.session();
  const today = new Date().toDateString();
  if (saved && saved.date === today) {
    session = saved;
  } else {
    session = {date: today, exercises: []};
    DB.saveSession(session);
  }
}

function saveSession() { DB.saveSession(session); }

// ===================== INIT =====================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  loadSession();
  renderWorkout();
  renderHistory();
  renderCoach();
  renderCustomExChips();
});

// ===================== WORKOUT =====================
function renderWorkout() {
  const c = document.getElementById('workoutContent');
  const addBtn = `<button class="add-exercise-btn" onclick="openExPicker()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
    Add Exercise
  </button>`;

  if (!session.exercises.length) {
    c.innerHTML = addBtn + `<div class="empty-state">
      <span class="empty-state-icon">🏋️</span>
      <div class="empty-state-title">Ready to train?</div>
      <div class="empty-state-sub">Tap Add Exercise to start logging sets</div>
    </div>`;
  } else {
    c.innerHTML = session.exercises.map((ex,ei) => buildExCard(ex, ei)).join('') + addBtn +
      `<button class="finish-btn" onclick="finishWorkout()">Finish Workout</button>`;
  }
}

function buildExCard(ex, ei) {
  const prev = getLastLift(ex.name);
  const doneVol = ex.sets.reduce((s,r)=> s + (r.done ? r.weight*r.reps : 0), 0);
  const isPR = doneVol > 0 && doneVol > getMaxVol(ex.name);

  const rows = ex.sets.map((set,si) => {
    const prevStr = prev ? `${prev.weight}×${prev.reps}` : '—';
    return `<div class="set-row ${set.done?'completed':''}" id="sr-${ei}-${si}">
      <span class="set-num" id="sn-${ei}-${si}" style="${set.done?'color:var(--green)':''}">${si+1}</span>
      <span class="set-prev">${prevStr}</span>
      <input class="set-input" type="number" inputmode="decimal"
        id="sw-${ei}-${si}" value="${set.weight||''}" placeholder="${prev?prev.weight:'kg'}"
        onfocus="this.select()">
      <input class="set-input" type="number" inputmode="numeric"
        id="sr2-${ei}-${si}" value="${set.reps||''}" placeholder="${prev?prev.reps:'reps'}"
        onfocus="this.select()">
      <div class="set-done-btn ${set.done?'done':''}" id="sdb-${ei}-${si}" onclick="toggleDone(${ei},${si})">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
      </div>
    </div>`;
  }).join('');

  return `<div class="ex-card" id="ec-${ei}">
    <div class="ex-card-header">
      <div class="ex-card-icon">${ex.icon}</div>
      <div class="ex-card-info">
        <div class="ex-card-name">
          ${ex.name}
          ${isPR ? '<span class="pr-badge">🏆 PR</span>' : ''}
        </div>
        <div class="ex-card-sub">${ex.muscle}${prev ? ` · Last: ${prev.weight}kg × ${prev.reps}` : ' · First time!'}</div>
      </div>
      <button class="ex-card-remove" onclick="removeEx(${ei})">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="set-table-head">
      <span>SET</span><span style="text-align:center">PREV</span>
      <span style="text-align:center">KG</span><span style="text-align:center">REPS</span><span></span>
    </div>
    ${rows}
    <button class="add-set-btn" onclick="addSet(${ei})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      Add Set
    </button>
  </div>`;
}

function addSet(ei) {
  const ex = session.exercises[ei];
  const prev = getLastLift(ex.name);
  ex.sets.push({weight: prev?prev.weight:'', reps: prev?prev.reps:'', done:false});
  saveSession();
  renderWorkout();
  setTimeout(()=> document.getElementById(`ec-${ei}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function removeEx(ei) {
  session.exercises.splice(ei,1);
  saveSession();
  renderWorkout();
}

function toggleDone(ei, si) {
  const wEl = document.getElementById(`sw-${ei}-${si}`);
  const rEl = document.getElementById(`sr2-${ei}-${si}`);
  const s = session.exercises[ei].sets[si];
  s.weight = parseFloat(wEl?.value)||s.weight||0;
  s.reps   = parseInt(rEl?.value)||s.reps||0;
  s.done   = !s.done;
  saveSession();

  // Update DOM without full re-render
  const row = document.getElementById(`sr-${ei}-${si}`);
  const btn = document.getElementById(`sdb-${ei}-${si}`);
  const num = document.getElementById(`sn-${ei}-${si}`);
  if (row) row.className = 'set-row ' + (s.done?'completed':'');
  if (btn) btn.className = 'set-done-btn ' + (s.done?'done':'');
  if (num) num.style.color = s.done ? 'var(--green)' : '';
  checkPRBadge(ei);
}

function checkPRBadge(ei) {
  const ex = session.exercises[ei];
  const doneVol = ex.sets.reduce((s,r)=> s+(r.done?r.weight*r.reps:0),0);
  const isPR = doneVol>0 && doneVol>getMaxVol(ex.name);
  const nameEl = document.querySelector(`#ec-${ei} .ex-card-name`);
  if (!nameEl) return;
  const existing = nameEl.querySelector('.pr-badge');
  if (isPR && !existing) nameEl.insertAdjacentHTML('beforeend','<span class="pr-badge">🏆 PR</span>');
  if (!isPR && existing) existing.remove();
}

function finishWorkout() {
  const entries = [];
  session.exercises.forEach(ex => {
    ex.sets.filter(s => s.done && s.reps > 0).forEach(s => {
      entries.push({
        id: Date.now().toString(36)+Math.random().toString(36).slice(2),
        exercise: ex.name, icon: ex.icon, muscle: ex.muscle,
        weight: s.weight||0, reps: s.reps,
        timestamp: Date.now(), date: new Date().toDateString()
      });
    });
  });

  if (!entries.length) { showToast('No completed sets to save!'); return; }
  const w = DB.workouts();
  entries.forEach(e => w.push(e));
  DB.saveWorkouts(w);
  session = {date: new Date().toDateString(), exercises: []};
  saveSession();
  showToast(`✅ ${entries.length} sets saved!`);
  renderWorkout();
  renderHistory();
  renderCoach();
}

// ===================== EXERCISE PICKER =====================
function openExPicker() {
  document.getElementById('exPickerOverlay').classList.add('open');
  document.getElementById('exSearch').value = '';
  filterExList('');
  setTimeout(()=>document.getElementById('exSearch').focus(), 250);
}

function closePickerOverlay(e) {
  if (e.target === document.getElementById('exPickerOverlay'))
    document.getElementById('exPickerOverlay').classList.remove('open');
}

function filterExList(q) {
  const custom = DB.customEx().map(n=>({name:n,icon:'✏️',muscle:'Custom'}));
  const all = [...EXERCISES, ...custom];
  const filtered = q ? all.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())) : all;
  const active = new Set(session.exercises.map(e=>e.name.toLowerCase()));
  const avail = filtered.filter(e=>!active.has(e.name.toLowerCase()));
  const added = filtered.filter(e=>active.has(e.name.toLowerCase()));

  let html = '';
  if (avail.length) {
    html += `<div class="sheet-ex-divider">Exercises</div>`;
    html += avail.map(ex=>`
      <div class="sheet-ex-item" onclick="pickEx(${JSON.stringify(ex.name)},${JSON.stringify(ex.icon)},${JSON.stringify(ex.muscle)})">
        <div class="sheet-ex-icon">${ex.icon}</div>
        <div><div class="sheet-ex-name">${ex.name}</div><div class="sheet-ex-muscle">${ex.muscle}</div></div>
      </div>`).join('');
  }
  if (added.length) {
    html += `<div class="sheet-ex-divider">Already Added</div>`;
    html += added.map(ex=>`
      <div class="sheet-ex-item" style="opacity:.4">
        <div class="sheet-ex-icon">${ex.icon}</div>
        <div><div class="sheet-ex-name">${ex.name}</div><div class="sheet-ex-muscle">${ex.muscle}</div></div>
      </div>`).join('');
  }
  if (!filtered.length) html = `<div style="text-align:center;padding:32px;color:var(--text3);font-size:14px">No exercises found</div>`;
  document.getElementById('exList').innerHTML = html;
}

function pickEx(name, icon, muscle) {
  document.getElementById('exPickerOverlay').classList.remove('open');
  const prev = getLastLift(name);
  const numSets = prev ? Math.min(prev.sets, 4) : 3;
  const sets = [];
  for (let i=0; i<numSets; i++) sets.push({weight:prev?prev.weight:'',reps:prev?prev.reps:'',done:false});
  session.exercises.push({name, icon, muscle, sets});
  saveSession();
  renderWorkout();
  setTimeout(()=>{
    const cards = document.querySelectorAll('.ex-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'start'});
  }, 60);
}

// ===================== HELPERS =====================
function getLastLift(name) {
  const all = DB.workouts().filter(w=>w.exercise.toLowerCase()===name.toLowerCase()).sort((a,b)=>b.timestamp-a.timestamp);
  if (!all.length) return null;
  const latest = all[0];
  const daySets = DB.workouts().filter(w=>w.exercise.toLowerCase()===name.toLowerCase()&&w.date===latest.date);
  return {...latest, sets: daySets.length};
}

function getMaxVol(name) {
  const all = DB.workouts().filter(w=>w.exercise.toLowerCase()===name.toLowerCase());
  if (!all.length) return 0;
  const byDay = {};
  all.forEach(w=>{ byDay[w.date]=(byDay[w.date]||0)+w.weight*w.reps; });
  return Math.max(...Object.values(byDay));
}

function fmtVol(v) { return v>=1000?(v/1000).toFixed(1)+'k':Math.round(v).toLocaleString(); }

function fmtDate(ds) {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if (ds===today) return 'Today';
  if (ds===yesterday) return 'Yesterday';
  return new Date(ds).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
}

// ===================== HISTORY =====================
function renderHistory() {
  const workouts = DB.workouts();
  // Stats
  const today = new Date().toDateString();
  const todayW = workouts.filter(w=>w.date===today);
  const todayVol = todayW.reduce((s,w)=>s+w.weight*w.reps, 0);
  const totalDays = new Set(workouts.map(w=>w.date)).size;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-tile">
      <div class="stat-val blue">${todayW.length}</div>
      <div class="stat-label">Today's Sets</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val">${fmtVol(todayVol)}</div>
      <div class="stat-label">Today's Volume (kg)</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val green">${totalDays}</div>
      <div class="stat-label">Training Days</div>
    </div>
    <div class="stat-tile">
      <div class="stat-val">${workouts.length}</div>
      <div class="stat-label">Total Sets Logged</div>
    </div>`;

  // Mini chart
  const t = new Date();
  const days7 = Array.from({length:7},(_,i)=>{
    const d = new Date(t); d.setDate(t.getDate()-6+i); return d.toDateString();
  });
  const vols = days7.map(d=>workouts.filter(w=>w.date===d).reduce((s,w)=>s+w.weight*w.reps,0));
  const maxV = Math.max(...vols,1);
  const labels = days7.map(d=>new Date(d).toLocaleDateString('en',{weekday:'narrow'}));
  document.getElementById('miniChartWrap').innerHTML = `
    <div class="stat-tile" style="padding:14px 16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:13px;font-weight:700;color:var(--text2)">7-Day Volume</span>
      </div>
      <div class="mini-chart">
        ${vols.map((v,i)=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
            <div class="mini-bar${days7[i]===today?' today':''}" style="height:${Math.max(4,Math.round(v/maxV*44))}px"></div>
            <span style="font-size:9px;color:var(--text3);font-weight:700">${labels[i]}</span>
          </div>`).join('')}
      </div>
    </div>`;

  // History list
  const sorted = workouts.sort((a,b)=>b.timestamp-a.timestamp);
  const container = document.getElementById('historyList');
  if (!sorted.length) {
    container.innerHTML = `<div class="empty-state">
      <span class="empty-state-icon">📋</span>
      <div class="empty-state-title">No history yet</div>
      <div class="empty-state-sub">Complete your first workout to see it here</div>
    </div>`;
    return;
  }

  const byDay = {};
  sorted.forEach(w=>{ if(!byDay[w.date])byDay[w.date]=[]; byDay[w.date].push(w); });

  container.innerHTML = Object.entries(byDay).map(([date,entries])=>{
    const vol = entries.reduce((s,w)=>s+w.weight*w.reps,0);
    const names = [...new Set(entries.map(w=>w.exercise))];
    const prs = names.filter(n=>{
      const dv = entries.filter(w=>w.exercise===n).reduce((s,w)=>s+w.weight*w.reps,0);
      return dv>=getMaxVol(n);
    });
    return `<div class="history-day">
      <div class="history-day-label">${fmtDate(date)}</div>
      <div class="history-workout-card">
        <div class="history-wc-header">
          <span class="history-wc-meta">${entries.length} sets · ${names.length} exercises</span>
          <span class="history-wc-vol">${fmtVol(vol)} kg</span>
        </div>
        <div class="history-wc-pills">
          ${names.map(n=>`<span class="history-pill${prs.includes(n)?' pr':''}">${prs.includes(n)?'🏆 ':''}${n}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===================== COACH =====================
function renderCoach() {
  const workouts = DB.workouts();
  const today = new Date().toDateString();
  const todayVol = workouts.filter(w=>w.date===today).reduce((s,w)=>s+w.weight*w.reps,0);
  const totalDays = new Set(workouts.map(w=>w.date)).size;
  const byDay = {};
  workouts.forEach(w=>{ byDay[w.date]=(byDay[w.date]||0)+w.weight*w.reps; });
  const allVols = Object.values(byDay);
  const avgVol = allVols.length ? Math.round(allVols.reduce((a,b)=>a+b,0)/allVols.length) : 0;
  const intensity = avgVol ? Math.min(100,Math.round(todayVol/avgVol*100)) : 0;
  const exCounts = {};
  workouts.forEach(w=>{ exCounts[w.exercise]=(exCounts[w.exercise]||0)+1; });
  const fav = Object.entries(exCounts).sort((a,b)=>b[1]-a[1])[0];
  const a = getAdvice(todayVol, avgVol, totalDays, fav);

  document.getElementById('coachContent').innerHTML = `
    <div class="coach-card">
      <div class="coach-header">
        <div class="coach-avatar">🤖</div>
        <div><div class="coach-name">BC Coach</div><div class="coach-role">AI Training Advisor</div></div>
      </div>
      <div class="coach-msg">${a.greeting}</div>
    </div>
    <div class="coach-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:14px;font-weight:700">Today's Intensity</span>
        <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent)">${intensity}%</span>
      </div>
      <div class="i-bar-wrap"><div class="i-bar-fill" style="width:${intensity}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:6px">
        <span>Today <strong style="color:var(--text)">${fmtVol(todayVol)}kg</strong></span>
        <span>Avg <strong style="color:var(--text)">${fmtVol(avgVol)}kg</strong></span>
      </div>
    </div>
    <div class="coach-card">
      ${a.tips.map((t,i)=>`<div class="tip-block" ${i===0?'style="margin-top:0;padding-top:0;border-top:none"':''}>
        <div class="tip-tag">${t.tag}</div>
        <div class="tip-text">${t.text}</div>
      </div>`).join('')}
    </div>
    <div class="coach-card" style="background:var(--accent-bg2);border-color:rgba(79,142,247,.2)">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px">🎯 Weekly Focus</div>
      <div class="tip-text">${a.focus}</div>
    </div>`;
}

function getAdvice(todayVol, avgVol, days, fav) {
  const h = new Date().getHours();
  const g = h<12?'Morning':'Evening';
  let greeting, tips, focus;

  if (!days) {
    greeting = `${g}! Welcome to BC GYM PLUS. Log your first workout to unlock personalized coaching. Every great journey starts with session one.`;
    tips = [
      {tag:'Getting Started', text:'Tap "Add Exercise" on the Workout tab. Pick a movement, enter your sets, reps and weight, then check each set as you complete it.'},
      {tag:'Foundation', text:'Build around the big four: Squat, Deadlift, Bench Press, and Overhead Press. These compound lifts drive the most muscle growth and strength gains.'}
    ];
    focus = 'This week: establish your baseline numbers on 3–4 key lifts. Focus on form over weight.';
  } else if (todayVol === 0) {
    greeting = `${g}! Rest day, or just warming up? Recovery is where your muscles actually grow and adapt. When you\'re ready to train, log your first set.`;
    tips = [
      {tag:'Recovery', text:'Aim for 7–9 hours of sleep and 1.6–2.2g of protein per kg of bodyweight. These two factors drive the majority of your adaptation outside the gym.'},
      {tag:'Next Session', text:'Check your last session in History and aim to beat it — add 2.5kg to upper body lifts and 5kg to lower body lifts. That\'s progressive overload.'}
    ];
    focus = `${days} training ${days===1?'day':'days'} logged. Consistency is your most powerful tool.`;
  } else if (todayVol < avgVol * 0.7) {
    greeting = `${g}! Lighter session today — that can be the smarter play. A focused, quality workout beats a high-volume grind on a fatigued body.`;
    tips = [
      {tag:'Deload', text:'Every 3–4 weeks, dropping to 50–60% of normal volume lets your nervous system recover and supercompensate — you\'ll return stronger.'},
      {tag:'Mind-Muscle', text:'On lighter days, slow the eccentric (lowering) phase to 3–4 seconds. This increases time under tension and makes light weights feel productive.'}
    ];
    focus = `Today: ${fmtVol(todayVol)}kg vs your avg ${fmtVol(avgVol)}kg. If feeling good, consider one more exercise.`;
  } else if (todayVol >= avgVol * 1.2) {
    greeting = `${g}! ${Math.round(todayVol/avgVol*100-100)}% above your average — this is elite effort. Sessions like this compound into serious long-term progress.`;
    tips = [
      {tag:'Form First', text:'At high volumes, fatigue degrades technique. On your final sets: brace your core, control the eccentric, and don\'t let the numbers override your form.'},
      {tag:'Fuel Recovery', text:'Get 30–50g of protein within 60 minutes post-workout. Your muscles are primed right now. Sleep tonight is critical.'}
    ];
    focus = `Outstanding session. Prioritize nutrition and sleep tonight to convert this output into real gains.`;
  } else {
    greeting = `${g}! Solid session — ${fmtVol(todayVol)}kg and right on pace. Consistent quality work is the true driver of long-term progress.`;
    tips = [
      {tag:'Progressive Overload', text:'The rule: add 2.5kg to upper body and 5kg to lower body each time you complete all reps cleanly. This is the single most important variable in training.'},
      {tag:'Balance', text: fav ? `Your most-trained lift is ${fav[0]} (${fav[1]} sessions). Make sure push and pull volume stay roughly equal to avoid imbalances.` : 'Aim for balance across push, pull, hinge, squat, and carry patterns each week.'}
    ];
    focus = `${days} training days in. You\'re building a real base. Aim for 3–5 sessions this week.`;
  }
  return {greeting, tips, focus};
}

// ===================== CUSTOM EXERCISES =====================
function addCustomExercise() {
  const input = document.getElementById('customExInput');
  const name = input.value.trim();
  if (!name) return;
  const all = [...EXERCISES.map(e=>e.name.toLowerCase()), ...DB.customEx().map(e=>e.toLowerCase())];
  if (all.includes(name.toLowerCase())) { showToast('Already exists!'); return; }
  const ce = DB.customEx();
  ce.push(name);
  DB.saveCustomEx(ce);
  input.value = '';
  renderCustomExChips();
  showToast(`"${name}" added`);
}

function renderCustomExChips() {
  const custom = DB.customEx();
  document.getElementById('customExChips').innerHTML = custom.length
    ? custom.map((n,i)=>`<div class="custom-ex-chip">${n}<button class="custom-ex-del" onclick="delCustomEx(${i})">×</button></div>`).join('')
    : `<span style="font-size:13px;color:var(--text3);padding:0 4px 4px">No custom exercises yet</span>`;
}

function delCustomEx(i) {
  const ce = DB.customEx(); ce.splice(i,1); DB.saveCustomEx(ce); renderCustomExChips();
}

// ===================== EXPORT / CLEAR =====================
function exportData() {
  const data = {app:'BC GYM PLUS v2',exportDate:new Date().toISOString(),workouts:DB.workouts(),customExercises:DB.customEx()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'),{href:url,download:`bcgym-${new Date().toISOString().split('T')[0]}.json`});
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('📤 Exported!');
}

function clearAllData() {
  if (!confirm('Delete ALL workout data? This cannot be undone.')) return;
  ['bcgp_w','bcgp_ce','bcgp_s'].forEach(k=>localStorage.removeItem(k));
  session = {date:new Date().toDateString(),exercises:[]};
  renderWorkout(); renderHistory(); renderCoach(); renderCustomExChips();
  showToast('Data cleared');
}

// ===================== NAV =====================
function switchScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  btn.classList.add('active');
  if (name==='history') renderHistory();
  if (name==='coach') renderCoach();
  if (name==='settings') renderCustomExChips();
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  const sw = `const C='bcgp2';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
